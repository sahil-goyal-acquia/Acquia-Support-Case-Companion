<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #141720;
    --surface2:  #1c2030;
    --border:    #262c3d;
    --accent:    #4f8ef7;
    --accent2:   #7c5cfc;
    --green:     #22d3a5;
    --amber:     #f5a623;
    --red:       #f75f5f;
    --text:      #e8ecf4;
    --muted:     #6b758f;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 380px;
    min-height: 200px;
    max-height: 600px;
    overflow-y: auto;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
  }

  body::-webkit-scrollbar { width: 4px; }
  body::-webkit-scrollbar-track { background: var(--bg); }
  body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: #fff;
    flex-shrink: 0;
    font-family: var(--sans);
  }
  .header-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .header-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }
  .header-case {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.25);
    border-radius: 5px;
    padding: 3px 8px;
  }

  /* ── Loading / Error ── */
  .state-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 36px 24px;
    gap: 10px;
    color: var(--muted);
    text-align: center;
    font-size: 12px;
    line-height: 1.6;
  }
  .state-icon { font-size: 28px; }
  .state-msg strong { color: var(--text); font-size: 13px; }

  /* ── Content area ── */
  .content { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

  /* ── Section ── */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .section-header {
    padding: 8px 12px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-header .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.7;
  }
  .section-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }

  /* ── Field row ── */
  .field {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-height: 22px;
  }
  .field-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    min-width: 88px;
    flex-shrink: 0;
  }
  .field-value {
    font-size: 12px;
    color: var(--text);
    line-height: 1.4;
    word-break: break-word;
  }
  .field-value.mono { font-family: var(--mono); font-size: 11px; }

  /* ── Priority badge ── */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    font-family: var(--mono);
  }
  .badge-high, .badge-critical  { background: rgba(247,95,95,0.15); color: var(--red); border: 1px solid rgba(247,95,95,0.3); }
  .badge-medium  { background: rgba(245,166,35,0.15); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
  .badge-low     { background: rgba(34,211,165,0.15); color: var(--green); border: 1px solid rgba(34,211,165,0.3); }
  .badge-default { background: rgba(107,117,143,0.15); color: var(--muted); border: 1px solid rgba(107,117,143,0.3); }

  /* ── Instance highlight ── */
  .instance-block {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(79,142,247,0.06);
    border: 1px solid rgba(79,142,247,0.2);
    border-radius: 8px;
    margin-bottom: 2px;
  }
  .instance-icon { font-size: 18px; }
  .instance-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .instance-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  /* ── Subscription cards ── */
  .sub-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 11px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .sub-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }
  .sub-product {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .sub-hosting {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .hosting-chip {
    font-family: var(--mono);
    font-size: 10px;
    background: rgba(124,92,252,0.12);
    color: #a78bf9;
    border: 1px solid rgba(124,92,252,0.25);
    border-radius: 4px;
    padding: 2px 7px;
  }

  /* ── Panic command ── */
  .panic-block {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(34,211,165,0.06);
    border: 1px solid rgba(34,211,165,0.2);
    border-radius: 8px;
    padding: 9px 12px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .panic-block:hover {
    background: rgba(34,211,165,0.12);
    border-color: rgba(34,211,165,0.4);
  }
  .panic-block:active { transform: scale(0.99); }
  .panic-cmd {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--green);
    flex: 1;
    letter-spacing: 0.3px;
  }
  .panic-copy-btn {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--green);
    opacity: 0.6;
    font-family: var(--mono);
    background: none;
    border: none;
    cursor: pointer;
    padding: 3px 7px;
    border-radius: 4px;
    border: 1px solid rgba(34,211,165,0.3);
    transition: all 0.15s;
  }
  .panic-copy-btn:hover { opacity: 1; background: rgba(34,211,165,0.1); }
  .panic-copy-btn.copied { color: var(--text); opacity: 0.9; }
  .panic-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: rgba(34,211,165,0.5);
    font-weight: 700;
    margin-bottom: 3px;
    font-family: var(--mono);
  }

  /* All panic commands section */
  .panic-list { display: flex; flex-direction: column; gap: 6px; }
  .panic-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 10px;
  }
  .panic-item-env {
    font-size: 9px;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 2px;
    letter-spacing: 0.4px;
  }
  .panic-item-cmd {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--green);
    font-weight: 600;
    flex: 1;
  }

  /* ── Notes ── */
  .notes-textarea {
    width: 100%;
    min-height: 90px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 9px 11px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.15s;
  }
  .notes-textarea::placeholder { color: var(--muted); opacity: 0.5; }
  .notes-textarea:focus { border-color: var(--accent); }

  .notes-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }
  .notes-hint {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .notes-save-btn {
    font-size: 10px;
    font-weight: 700;
    font-family: var(--mono);
    letter-spacing: 0.5px;
    background: rgba(79,142,247,0.15);
    color: var(--accent);
    border: 1px solid rgba(79,142,247,0.3);
    border-radius: 5px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .notes-save-btn:hover { background: rgba(79,142,247,0.25); }
  .notes-save-btn.saved { color: var(--green); background: rgba(34,211,165,0.1); border-color: rgba(34,211,165,0.3); }

  /* ── Footer ── */
  .footer {
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-link {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .footer-link:hover { color: var(--accent); }
  .refresh-btn {
    font-size: 10px;
    font-family: var(--mono);
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 5px;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Divider ── */
  .divider { height: 1px; background: var(--border); margin: 2px 0; }

  /* ── Raw text fallback ── */
  .raw-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.7;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 7px;
    border: 1px solid var(--border);
    max-height: 140px;
    overflow-y: auto;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">CC</div>
  <div>
    <div class="header-title">Case Companion</div>
    <div class="header-sub">Acquia Support Toolkit</div>
  </div>
  <div class="header-case" id="headerCase">—</div>
</div>

<div id="mainContent">
  <div class="state-msg">
    <div class="state-icon">⚡</div>
    <strong>Loading case…</strong>
    <span>Extracting data from Salesforce page</span>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
